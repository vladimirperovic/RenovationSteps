  <script>
    lucide.createIcons();

    // Shader
    function initShader() {
      const container = document.getElementById('shader-container');
      if (!container || !window.THREE) return;
      const THREE = window.THREE;
      container.innerHTML = '';
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);
      const scene = new THREE.Scene();
      const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
      const mat = new THREE.ShaderMaterial({
        uniforms: { u_time: { value: 0 }, u_res: { value: new THREE.Vector2(container.clientWidth, container.clientHeight) } },
        vertexShader: `void main(){gl_Position=vec4(position,1.);}`,
        fragmentShader: `uniform float u_time;uniform vec2 u_res;void main(){vec2 uv=gl_FragCoord.xy/u_res;float t=u_time*0.15;vec3 col=vec3(0.04,0.04,0.07);float b=sin(uv.x*3.+t)*0.5+0.5;b*=sin(uv.y*2.+t*0.7)*0.5+0.5;col+=vec3(0.04,0.03,0.12)*b*0.4;gl_FragColor=vec4(col,1.);}`
      });
      const mesh = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), mat);
      scene.add(mesh);
      let s = Date.now();
      (function animate() { requestAnimationFrame(animate); mat.uniforms.u_time.value = (Date.now()-s)/1000; renderer.render(scene, camera); })();
      window.addEventListener('resize', () => { renderer.setSize(container.clientWidth, container.clientHeight); mat.uniforms.u_res.value.set(container.clientWidth, container.clientHeight); });
    }
    document.readyState === 'loading' ? document.addEventListener('DOMContentLoaded', initShader) : initShader();

    // Render verification state based on ?status= param
    (function renderStatus() {
      const lang   = localStorage.getItem('landing_lang') || 'en';
      const tr     = landingTranslations[lang] || landingTranslations.en;
      const status = new URLSearchParams(window.location.search).get('status') || 'invalid';

      const configs = {
        success: {
          icon: 'circle-check-big', iconColor: 'text-emerald-400', iconBg: 'bg-emerald-400/10 border-emerald-400/20',
          title: tr.verify_success_title, desc: tr.verify_success_desc,
          btnText: tr.verify_back, btnHref: 'index.html'
        },
        expired: {
          icon: 'clock', iconColor: 'text-amber-400', iconBg: 'bg-amber-400/10 border-amber-400/20',
          title: tr.verify_expired_title, desc: tr.verify_expired_desc,
          btnText: tr.verify_signup_again, btnHref: 'index.html'
        },
        already: {
          icon: 'circle-check-big', iconColor: 'text-indigo-400', iconBg: 'bg-indigo-400/10 border-indigo-400/20',
          title: tr.verify_already_title, desc: tr.verify_already_desc,
          btnText: tr.verify_back, btnHref: 'index.html'
        },
        invalid: {
          icon: 'circle-x', iconColor: 'text-red-400', iconBg: 'bg-red-400/10 border-red-400/20',
          title: tr.verify_invalid_title, desc: tr.verify_invalid_desc,
          btnText: tr.verify_signup_again, btnHref: 'index.html'
        }
      };

      const cfg = configs[status] || configs.invalid;
      const iconEl = document.getElementById('verifyIcon');
      iconEl.className = `w-20 h-20 rounded-full flex items-center justify-center border ${cfg.iconBg}`;
      iconEl.innerHTML = `<i data-lucide="${cfg.icon}" class="w-9 h-9 ${cfg.iconColor}"></i>`;
      document.getElementById('verifyTitle').textContent = cfg.title;
      document.getElementById('verifyDesc').textContent  = cfg.desc;
      const btn = document.getElementById('verifyBtn');
      btn.textContent = cfg.btnText;
      btn.href = cfg.btnHref;
      lucide.createIcons();
    })();
  </script>
