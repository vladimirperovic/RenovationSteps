  <script>
    function toggleMobileMenu() {
      const menu = document.getElementById('mobileMenu');
      if (menu.style.display === 'none' || menu.style.display === '') {
        menu.style.display = 'flex';
        document.body.style.overflow = 'hidden';
      } else {
        menu.style.display = 'none';
        document.body.style.overflow = '';
      }
    }


    lucide.createIcons();


    function initShader() {
      const container = document.getElementById('shader-container');
      if (!container || !window.THREE) return;
      const THREE = window.THREE;
      container.innerHTML = "";
      const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      container.appendChild(renderer.domElement);
      const scene = new THREE.Scene();
      const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);
      const geo = new THREE.PlaneGeometry(2, 2);
      const mat = new THREE.ShaderMaterial({
        uniforms: { u_time: { value: 0.0 }, u_resolution: { value: new THREE.Vector2(container.clientWidth, container.clientHeight) } },
        vertexShader: `void main(){gl_Position=vec4(position,1.);}`,
        fragmentShader: `
          uniform float u_time;
          uniform vec2 u_resolution;
          void main(){
            vec2 uv=gl_FragCoord.xy/u_resolution;
            float t=u_time*0.15;
            vec3 col=vec3(0.04,0.04,0.07);
            float b=sin(uv.x*3.+t)*0.5+0.5;
            b*=sin(uv.y*2.+t*0.7)*0.5+0.5;
            col+=vec3(0.04,0.03,0.12)*b*0.4;
            gl_FragColor=vec4(col,1.);
          }`
      });
      const mesh = new THREE.Mesh(geo, mat);
      scene.add(mesh);
      let start = Date.now();
      (function animate() { requestAnimationFrame(animate); mat.uniforms.u_time.value = (Date.now()-start)/1000; renderer.render(scene,camera); })();
      window.addEventListener('resize', ()=>{ renderer.setSize(container.clientWidth,container.clientHeight); mat.uniforms.u_resolution.value.set(container.clientWidth,container.clientHeight); });
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initShader);
    } else {
      initShader();
    }
  </script>
